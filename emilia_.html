<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Emilia 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --orchid-purple: #b56fcc;
      --orchid-pink:   #e87db0;
      --orchid-yellow: #f5c842;
      --orchid-white:  #f8f0ff;
      --orchid-deep:   #7e3fa0;
      --leaf:          #4a7c40;
      --leaf-dark:     #2e5229;
      --cream:         #fdf6ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow-x: hidden; }

    body {
      min-height: 100vh;
      background: linear-gradient(150deg, #f3e8ff 0%, #fdf0fa 25%, #e8f4ff 55%, #f5e8ff 80%, #fde8f4 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      position: relative;
      padding: 2rem 1rem 3rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .petal-bg {
      position: fixed; inset: 0;
      overflow: hidden; pointer-events: none; z-index: 0;
    }
    .fp {
      position: absolute;
      border-radius: 70% 30% 60% 40% / 40% 70% 30% 60%;
      opacity: 0;
      animation: floatPetal linear infinite;
    }
    @keyframes floatPetal {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
      6%   { opacity: 0.38; }
      88%  { opacity: 0.22; }
      100% { transform: translateY(-15vh) rotate(540deg); opacity: 0; }
    }

    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.70);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1.5px solid rgba(255,255,255,0.92);
      border-radius: 32px;
      padding: 2.5rem 2rem 2.8rem;
      max-width: 430px; width: 100%;
      box-shadow:
        0 10px 50px rgba(130, 60, 180, 0.14),
        0 2px 10px rgba(100, 30, 140, 0.09),
        inset 0 1px 0 rgba(255,255,255,0.92);
      text-align: center;
      animation: cardIn 1.1s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 70px; height: 3px;
      background: linear-gradient(90deg, #d4a0f0, #e87db0, #7e3fa0, #d4a0f0);
      border-radius: 0 0 4px 4px;
    }

    .bouquet-wrap {
      width: 100%; max-width: 340px;
      margin: 0 auto 1.6rem;
      filter:
        drop-shadow(0 22px 32px rgba(120,50,180,0.22))
        drop-shadow(0 6px 14px rgba(80,20,120,0.13));
      animation: floatBouquet 4.5s ease-in-out infinite;
    }
    @keyframes floatBouquet {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .orchid-group { cursor: default; transition: filter 0.3s; }
    .orchid-group:hover { filter: brightness(1.07) saturate(1.1); }

    .label-top {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.78rem; font-weight: 300;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--orchid-purple);
      margin-bottom: 1.4rem; opacity: 0;
      animation: fadeUp 0.8s 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .message {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.15rem, 4.5vw, 1.4rem);
      font-weight: 400; font-style: italic;
      line-height: 1.65; color: #4a1a6b;
      text-shadow: 0 1px 4px rgba(130,60,180,0.10);
      opacity: 0;
      animation: fadeUp 0.9s 1s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .message em { font-weight: 600; color: var(--orchid-deep); font-style: normal; }
    .divider {
      margin: 1.5rem auto 1.4rem;
      width: 80px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--orchid-purple), transparent);
      opacity: 0; animation: fadeUp 0.7s 1.4s ease forwards;
    }
    .signature {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; color: var(--orchid-purple); font-style: italic;
      opacity: 0; animation: fadeUp 0.7s 1.6s ease forwards;
    }
    .hearts {
      margin-top: 0.7rem; font-size: 1.1rem;
      letter-spacing: 0.15em;
      opacity: 0; animation: fadeUp 0.7s 1.9s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .ornament {
      position: absolute; bottom: 18px; left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem; letter-spacing: 0.2em;
      color: var(--orchid-purple); opacity: 0.4;
    }
  </style>
</head>

<script>
  const petalBg = document.getElementById('petalBg');
  const colors = [
    '#e8d0f8','#c47ee0','#fce4f5','#f084c0',
    '#f8f0ff','#eedcff','#fff8d0','#f5c842',
    '#ffe0f5','#f04090','#d4a0f0','#f8b8e0'
  ];

  for (let i = 0; i < 26; i++) {
    const fp = document.createElement('div');
    fp.className = 'fp';
    const size = 9 + Math.random() * 20;
    const left = Math.random() * 100;
    const duration = 13 + Math.random() * 22;
    const delay = Math.random() * 20;
    const color = colors[Math.floor(Math.random() * colors.length)];
    fp.style.cssText = `
      width: ${size}px; height: ${size * 0.65}px;
      left: ${left}%;
      background: ${color};
      animation-duration: ${duration}s;
      animation-delay: ${delay}s;
      transform-origin: center;
    `;
    petalBg.appendChild(fp);
  }
</script>
