<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Emilia 🌷</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --blush:      #f7c5d0;
      --rose:       #e8829a;
      --deep-rose:  #c95578;
      --petal-light:#fde8ee;
      --petal-mid:  #f4a7bc;
      --petal-dark: #d4607e;
      --leaf:       #5a8a55;
      --leaf-dark:  #3d6438;
      --stem:       #4a7a45;
      --cream:      #fdf6f0;
      --gold:       #c9a96e;
      --shadow:     rgba(180, 60, 100, 0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #fde8ee 0%, #fdf0f5 30%, #f9e4ef 60%, #fce0e8 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      position: relative;
      padding: 2rem 1rem 3rem;
    }

    /* Subtle noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* Floating petals background */
    .petal-bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .fp {
      position: absolute;
      border-radius: 60% 40% 50% 50% / 40% 60% 40% 60%;
      opacity: 0;
      animation: floatPetal linear infinite;
    }

    @keyframes floatPetal {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
      5%   { opacity: 0.35; }
      90%  { opacity: 0.25; }
      100% { transform: translateY(-15vh) rotate(720deg); opacity: 0; }
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1.5px solid rgba(255,255,255,0.9);
      border-radius: 32px;
      padding: 2.5rem 2rem 2.8rem;
      max-width: 420px;
      width: 100%;
      box-shadow:
        0 8px 40px rgba(180, 60, 100, 0.14),
        0 2px 8px rgba(180, 60, 100, 0.08),
        inset 0 1px 0 rgba(255,255,255,0.9);
      text-align: center;
      animation: cardIn 1.1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    /* Decorative top line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 60px; height: 3px;
      background: linear-gradient(90deg, var(--blush), var(--deep-rose), var(--blush));
      border-radius: 0 0 4px 4px;
    }

    /* ──────────── SVG BOUQUET ──────────── */
    .bouquet-wrap {
      width: 100%;
      max-width: 320px;
      margin: 0 auto 1.6rem;
      filter:
        drop-shadow(0 20px 30px rgba(180,60,100,0.22))
        drop-shadow(0 6px 12px rgba(100,30,60,0.14));
      animation: floatBouquet 4s ease-in-out infinite;
    }

    @keyframes floatBouquet {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-9px); }
    }

    /* Tulip hover shimmer */
    .tulip-group { cursor: default; }
    .tulip-group:hover .petal { filter: brightness(1.08); }

    /* ──────────── TYPOGRAPHY ──────────── */
    .label-top {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 1.4rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .message {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.15rem, 4.5vw, 1.4rem);
      font-weight: 400;
      font-style: italic;
      line-height: 1.65;
      color: #6b2442;
      text-shadow: 0 1px 4px rgba(200,80,120,0.10);
      opacity: 0;
      animation: fadeUp 0.9s 1s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .message em {
      font-weight: 600;
      color: var(--deep-rose);
      font-style: normal;
    }

    .divider {
      margin: 1.5rem auto 1.4rem;
      width: 80px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--rose), transparent);
      opacity: 0;
      animation: fadeUp 0.7s 1.4s ease forwards;
    }

    .signature {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--rose);
      font-style: italic;
      opacity: 0;
      animation: fadeUp 0.7s 1.6s ease forwards;
    }

    .hearts {
      margin-top: 0.7rem;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      opacity: 0;
      animation: fadeUp 0.7s 1.9s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Bottom ornament */
    .ornament {
      position: absolute;
      bottom: 18px; left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--rose);
      opacity: 0.45;
    }
  </style>
</head>
<body>

<!-- Floating petals -->
<div class="petal-bg" id="petalBg"></div>

<div class="card">
  <p class="label-top">✦ con todo el cariño ✦</p>

  <!-- ═══════════ RAMO DE TULIPANES SVG ═══════════ -->
  <div class="bouquet-wrap">
    <svg viewBox="0 0 320 370" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;" aria-label="Ramo de tulipanes rosas">
      <defs>
        <!-- Gradientes pétalos -->
        <linearGradient id="p1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#fde8ee"/>
          <stop offset="50%" stop-color="#f4a7bc"/>
          <stop offset="100%" stop-color="#d4607e"/>
        </linearGradient>
        <linearGradient id="p2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#fce4ed"/>
          <stop offset="50%" stop-color="#eda8bf"/>
          <stop offset="100%" stop-color="#c95578"/>
        </linearGradient>
        <linearGradient id="p3" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f9d6e6"/>
          <stop offset="60%" stop-color="#e88fab"/>
          <stop offset="100%" stop-color="#bf4a70"/>
        </linearGradient>
        <linearGradient id="pLight" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#fef0f5"/>
          <stop offset="100%" stop-color="#f7c5d0"/>
        </linearGradient>
        <!-- Gradiente tallo -->
        <linearGradient id="stem" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#3d6438"/>
          <stop offset="50%" stop-color="#5a8a55"/>
          <stop offset="100%" stop-color="#3d6438"/>
        </linearGradient>
        <!-- Gradiente hoja -->
        <linearGradient id="leaf1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#6da665"/>
          <stop offset="100%" stop-color="#3d6438"/>
        </linearGradient>
        <linearGradient id="leaf2" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#5a9052"/>
          <stop offset="100%" stop-color="#2e5029"/>
        </linearGradient>
        <!-- Cinta lazo -->
        <linearGradient id="ribbon" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f9d6e6"/>
          <stop offset="100%" stop-color="#e8829a"/>
        </linearGradient>
        <!-- Sombra -->
        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#c95578" flood-opacity="0.25"/>
        </filter>
        <filter id="petalGlow">
          <feGaussianBlur stdDeviation="1.5" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
      </defs>

      <!-- ── TALLOS ── -->
      <!-- Tallo izquierdo (tulipán lateral izq) -->
      <path d="M118 340 Q108 280 100 220 Q95 180 102 150" stroke="url(#stem)" stroke-width="5" fill="none" stroke-linecap="round"/>
      <!-- Tallo centro-izq -->
      <path d="M148 340 Q145 280 148 220 Q150 175 152 130" stroke="url(#stem)" stroke-width="5.5" fill="none" stroke-linecap="round"/>
      <!-- Tallo centro (principal) -->
      <path d="M168 340 Q168 280 166 210 Q164 160 160 110" stroke="url(#stem)" stroke-width="6" fill="none" stroke-linecap="round"/>
      <!-- Tallo centro-der -->
      <path d="M190 340 Q192 282 192 220 Q192 175 188 132" stroke="url(#stem)" stroke-width="5.5" fill="none" stroke-linecap="round"/>
      <!-- Tallo derecho -->
      <path d="M214 340 Q220 280 220 218 Q220 178 216 152" stroke="url(#stem)" stroke-width="5" fill="none" stroke-linecap="round"/>

      <!-- ── HOJAS ── -->
      <!-- Hoja grande izquierda -->
      <path d="M118 290 Q78 255 72 215 Q90 228 118 260 Z" fill="url(#leaf1)" opacity="0.9"/>
      <path d="M118 290 Q108 260 118 240" stroke="#3d6438" stroke-width="1" fill="none" opacity="0.5"/>
      <!-- Hoja pequeña izquierda -->
      <path d="M108 240 Q80 220 82 195 Q98 210 112 228 Z" fill="url(#leaf2)" opacity="0.85"/>
      <!-- Hoja grande derecha -->
      <path d="M214 285 Q252 248 260 210 Q242 224 216 258 Z" fill="url(#leaf1)" opacity="0.9"/>
      <path d="M214 285 Q222 258 214 238" stroke="#3d6438" stroke-width="1" fill="none" opacity="0.5"/>
      <!-- Hoja pequeña derecha -->
      <path d="M216 242 Q248 218 244 190 Q228 207 218 228 Z" fill="url(#leaf2)" opacity="0.85"/>
      <!-- Hoja central -->
      <path d="M166 280 Q140 255 138 228 Q154 242 166 262 Z" fill="url(#leaf1)" opacity="0.8"/>
      <path d="M190 270 Q214 248 215 222 Q200 236 190 256 Z" fill="url(#leaf2)" opacity="0.8"/>

      <!-- ── CINTA / LAZO ── -->
      <!-- Lazo izquierdo -->
      <path d="M145 330 Q120 308 118 290 Q135 302 148 318 Z" fill="url(#ribbon)" opacity="0.9"/>
      <!-- Lazo derecho -->
      <path d="M188 330 Q212 308 216 288 Q200 300 186 318 Z" fill="url(#ribbon)" opacity="0.9"/>
      <!-- Nudo cinta -->
      <ellipse cx="166" cy="328" rx="18" ry="9" fill="#f4a7bc" stroke="#e8829a" stroke-width="1"/>
      <ellipse cx="166" cy="328" rx="8" ry="5" fill="#fde8ee"/>
      <!-- Colas cinta -->
      <path d="M152 332 Q138 345 130 352 Q136 340 148 334 Z" fill="url(#ribbon)"/>
      <path d="M180 332 Q194 345 202 352 Q196 340 184 334 Z" fill="url(#ribbon)"/>

      <!-- ══════════ TULIPÁN CENTRO (el más alto) ══════════ -->
      <g class="tulip-group" filter="url(#softShadow)">
        <!-- Sépalo verde -->
        <ellipse cx="160" cy="128" rx="12" ry="8" fill="#5a8a55" opacity="0.8"/>
        <!-- Pétalo trasero centro -->
        <ellipse cx="160" cy="100" rx="20" ry="32" fill="url(#p1)" opacity="0.6" class="petal"/>
        <!-- Pétalo izquierdo -->
        <path class="petal" d="M160 128 Q132 118 128 88 Q138 72 152 68 Q148 88 160 110 Z" fill="url(#p2)"/>
        <!-- Pétalo derecho -->
        <path class="petal" d="M160 128 Q188 118 192 88 Q182 72 168 68 Q172 88 160 110 Z" fill="url(#p2)"/>
        <!-- Pétalo frontal izq -->
        <path class="petal" d="M160 128 Q138 114 136 84 Q146 64 158 62 Q156 84 160 108 Z" fill="url(#p3)"/>
        <!-- Pétalo frontal der -->
        <path class="petal" d="M160 128 Q182 114 184 84 Q174 64 162 62 Q164 84 160 108 Z" fill="url(#p3)"/>
        <!-- Centro pétalo frontal -->
        <path class="petal" d="M160 128 Q154 108 154 80 Q158 58 160 58 Q162 58 166 80 Q166 108 160 128 Z" fill="url(#pLight)" opacity="0.55"/>
        <!-- Reflejo interior -->
        <ellipse cx="156" cy="90" rx="5" ry="12" fill="white" opacity="0.2" transform="rotate(-8,156,90)"/>
      </g>

      <!-- ══════════ TULIPÁN CENTRO-IZQ ══════════ -->
      <g class="tulip-group" filter="url(#softShadow)">
        <ellipse cx="152" cy="148" rx="11" ry="7" fill="#5a8a55" opacity="0.8"/>
        <ellipse cx="152" cy="122" rx="18" ry="29" fill="url(#p2)" opacity="0.55" class="petal"/>
        <path class="petal" d="M152 148 Q128 136 124 108 Q134 92 148 88 Q144 108 152 132 Z" fill="url(#p1)"/>
        <path class="petal" d="M152 148 Q176 136 180 108 Q170 92 156 88 Q160 108 152 132 Z" fill="url(#p1)"/>
        <path class="petal" d="M152 148 Q130 134 128 104 Q138 84 150 82 Q148 104 152 128 Z" fill="url(#p3)"/>
        <path class="petal" d="M152 148 Q174 134 176 104 Q166 84 154 82 Q156 104 152 128 Z" fill="url(#p3)"/>
        <path class="petal" d="M152 148 Q146 128 146 100 Q150 80 152 78 Q154 80 158 100 Q158 128 152 148 Z" fill="url(#pLight)" opacity="0.5"/>
        <ellipse cx="148" cy="110" rx="4" ry="10" fill="white" opacity="0.18" transform="rotate(-8,148,110)"/>
      </g>

      <!-- ══════════ TULIPÁN CENTRO-DER ══════════ -->
      <g class="tulip-group" filter="url(#softShadow)">
        <ellipse cx="188" cy="150" rx="11" ry="7" fill="#5a8a55" opacity="0.8"/>
        <ellipse cx="188" cy="124" rx="18" ry="29" fill="url(#p3)" opacity="0.55" class="petal"/>
        <path class="petal" d="M188 150 Q164 138 160 110 Q170 94 184 90 Q180 110 188 134 Z" fill="url(#p2)"/>
        <path class="petal" d="M188 150 Q212 138 216 110 Q206 94 192 90 Q196 110 188 134 Z" fill="url(#p2)"/>
        <path class="petal" d="M188 150 Q166 136 164 106 Q174 86 186 84 Q184 106 188 130 Z" fill="url(#p1)"/>
        <path class="petal" d="M188 150 Q210 136 212 106 Q202 86 190 84 Q192 106 188 130 Z" fill="url(#p1)"/>
        <path class="petal" d="M188 150 Q182 130 182 102 Q186 82 188 80 Q190 82 194 102 Q194 130 188 150 Z" fill="url(#pLight)" opacity="0.5"/>
        <ellipse cx="184" cy="112" rx="4" ry="10" fill="white" opacity="0.18" transform="rotate(-8,184,112)"/>
      </g>

      <!-- ══════════ TULIPÁN IZQ (más pequeño) ══════════ -->
      <g class="tulip-group" filter="url(#softShadow)">
        <ellipse cx="103" cy="168" rx="10" ry="6.5" fill="#5a8a55" opacity="0.8"/>
        <ellipse cx="103" cy="146" rx="16" ry="26" fill="url(#p1)" opacity="0.5" class="petal"/>
        <path class="petal" d="M103 168 Q82 158 78 132 Q88 116 100 112 Q97 132 103 152 Z" fill="url(#p2)"/>
        <path class="petal" d="M103 168 Q124 158 128 132 Q118 116 106 112 Q109 132 103 152 Z" fill="url(#p2)"/>
        <path class="petal" d="M103 168 Q84 154 82 126 Q90 106 102 104 Q100 126 103 148 Z" fill="url(#p3)"/>
        <path class="petal" d="M103 168 Q122 154 124 126 Q116 106 104 104 Q106 126 103 148 Z" fill="url(#p3)"/>
        <path class="petal" d="M103 168 Q98 148 98 122 Q101 104 103 102 Q105 104 108 122 Q108 148 103 168 Z" fill="url(#pLight)" opacity="0.48"/>
        <ellipse cx="100" cy="130" rx="4" ry="9" fill="white" opacity="0.16" transform="rotate(-8,100,130)"/>
      </g>

      <!-- ══════════ TULIPÁN DER (más pequeño) ══════════ -->
      <g class="tulip-group" filter="url(#softShadow)">
        <ellipse cx="217" cy="170" rx="10" ry="6.5" fill="#5a8a55" opacity="0.8"/>
        <ellipse cx="217" cy="148" rx="16" ry="26" fill="url(#p3)" opacity="0.5" class="petal"/>
        <path class="petal" d="M217 170 Q196 160 192 134 Q202 118 214 114 Q211 134 217 154 Z" fill="url(#p1)"/>
        <path class="petal" d="M217 170 Q238 160 242 134 Q232 118 220 114 Q223 134 217 154 Z" fill="url(#p1)"/>
        <path class="petal" d="M217 170 Q198 156 196 128 Q204 108 216 106 Q214 128 217 150 Z" fill="url(#p2)"/>
        <path class="petal" d="M217 170 Q236 156 238 128 Q230 108 218 106 Q220 128 217 150 Z" fill="url(#p2)"/>
        <path class="petal" d="M217 170 Q212 150 212 124 Q215 106 217 104 Q219 106 222 124 Q222 150 217 170 Z" fill="url(#pLight)" opacity="0.48"/>
        <ellipse cx="214" cy="132" rx="4" ry="9" fill="white" opacity="0.16" transform="rotate(-8,214,132)"/>
      </g>

      <!-- Pequeños detalles: estambres / brillos internos -->
      <circle cx="160" cy="100" r="3" fill="#f9e4e0" opacity="0.55"/>
      <circle cx="152" cy="120" r="2.5" fill="#f9e4e0" opacity="0.5"/>
      <circle cx="188" cy="122" r="2.5" fill="#f9e4e0" opacity="0.5"/>
      <circle cx="103" cy="142" r="2.2" fill="#f9e4e0" opacity="0.45"/>
      <circle cx="217" cy="144" r="2.2" fill="#f9e4e0" opacity="0.45"/>
    </svg>
  </div>
  <!-- ═══════════ FIN RAMO ═══════════ -->

  <p class="message">
    "Unas flores a la distancia,<br>
    porque te lo mereces<br>
    mi querida <em>Emilia</em>"
  </p>

  <div class="divider"></div>
  <p class="signature">Con todo el cariño del mundo 🌷</p>
  <p class="hearts">♡ &nbsp; ♡ &nbsp; ♡</p>

  <span class="ornament">✦ ✦ ✦</span>
</div>

<script>
  // Generar pétalos flotantes
  const petalBg = document.getElementById('petalBg');
  const colors = ['#f7c5d0','#f4a7bc','#fde8ee','#eda8bf','#e8829a','#fce4ed'];

  for (let i = 0; i < 22; i++) {
    const fp = document.createElement('div');
    fp.className = 'fp';
    const size = 10 + Math.random() * 22;
    const left = Math.random() * 100;
    const duration = 12 + Math.random() * 20;
    const delay = Math.random() * 18;
    const color = colors[Math.floor(Math.random() * colors.length)];
    fp.style.cssText = `
      width: ${size}px; height: ${size * 0.7}px;
      left: ${left}%;
      background: ${color};
      animation-duration: ${duration}s;
      animation-delay: ${delay}s;
      transform-origin: center;
    `;
    petalBg.appendChild(fp);
  }
</script>
</body>
</html>
